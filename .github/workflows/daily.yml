name: Daily Score Update

on:
  schedule:
    # Run at 06:00 UTC daily during the World Cup (June 11 - July 19, 2026)
    - cron: '0 6 * 6-7 *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python src/fetch_results.py --all
          echo "Results fetched."

      - name: Run scoring engine
        run: |
          python src/score.py
          echo "Scoring complete."

      - name: Update README leaderboard
        run: |
          python src/generate_leaderboard.py --inject-readme
          echo "README updated."

      - name: Fetch Polymarket odds
        run: |
          python src/fetch_polymarket.py || echo "Polymarket fetch failed (non-blocking)"

      - name: Copy leaderboard to dashboard
        run: |
          # Copy leaderboard.json to docs/ for GitHub Pages
          if [ -f data/leaderboard.json ]; then
            mkdir -p docs/data
            cp data/leaderboard.json docs/data/leaderboard.json
            cp data/tournament.json docs/data/tournament.json
            # Copy predictions summary
            python -c "
import json, os, glob
preds = []
for f in sorted(glob.glob('predictions/pre-tournament/*_prediction.json')):
    with open(f) as fp:
        d = json.load(fp)
    preds.append({
        'model_name': d.get('model_name'),
        'model_id': d.get('model_id'),
        'champion': d.get('final_standings',{}).get('champion'),
        'runner_up': d.get('final_standings',{}).get('runner_up'),
        'third_place': d.get('final_standings',{}).get('third_place'),
        'fourth_place': d.get('final_standings',{}).get('fourth_place'),
    })
with open('docs/data/predictions_summary.json','w') as fp:
    json.dump(preds, fp, indent=2)
print(f'Wrote {len(preds)} prediction summaries')
"
          fi

      - name: Commit and push
        run: |
          git config user.name "WorldCupBench Bot"
          git config user.email "bot@worldcupbench.dev"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "[skip ci] auto: update scores $(date -u +%Y-%m-%d)"
            git push
          fi
